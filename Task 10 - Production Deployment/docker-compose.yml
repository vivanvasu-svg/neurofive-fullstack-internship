version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: brew-mongo-prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brew-haven-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/brew-haven
      - JWT_SECRET=supersecretjwtkey
    depends_on:
      - mongodb

volumes:
  mongo-data:
